name: "review-lens"
description: "Multi-lens, self-verifying LLM code review that comments on your pull request."
branding:
  icon: "search"
  color: "purple"

inputs:
  anthropic-api-key:
    description: "Anthropic API key (store as a repo secret)."
    required: true
  fail-on:
    description: "Fail the check if any finding is at least this severe (blocker|high|medium|low|nit)."
    required: false
    default: "blocker"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - shell: bash
      run: pip install review-lens
    - shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GH_TOKEN: ${{ github.token }}
        BASE: ${{ github.base_ref }}
        PR: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        git fetch origin "$BASE" --depth=1
        rc=0
        git diff "origin/$BASE...HEAD" \
          | review-lens - --format markdown --fail-on "${{ inputs.fail-on }}" > review.md || rc=$?
        gh pr comment "$PR" --body-file review.md || true
        exit "$rc"
